<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toytastic - Children's Toy Store</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Welcome to Toytastic - Children's Toy Store</h1>
  </header>
  <main>
    <div class="product-grid">
      <div class="product">
        <img src="toy_car.jpg" alt="Toy Car">
        <h2>Toy Car</h2>
        <p>$10.99</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="lego_set.jpg" alt="Lego Set">
        <h2>Lego Set</h2>
        <p>$29.99</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="doll_house.jpg" alt="Doll House">
        <h2>Doll House</h2>
        <p>$19.99</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="teddy_bear.jpg" alt="Teddy Bear">
        <h2>Teddy Bear</h2>
        <p>$15.49</p>
        <button>Add to Cart</button>
      </div>
    </div>
  </main>
  <footer>
    <button id="view-cart">View Cart</button>
  </footer>
</div>
</body>
</html>
