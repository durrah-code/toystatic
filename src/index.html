<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Toytastic - Children's Toy Store</title>
    <!-- Add your stylesheets here -->
    <link rel="stylesheet" href="styles.css">
    <!-- Add Google Fonts or other libraries here if needed -->
</head>

<body>
<!-- Header Section -->
<header>
    <div class="container">
        <h1>Welcome to Toytastic!</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Cart</a></li>
                <li><a href="#">Login</a></li>
            </ul>
        </nav>
    </div>
</header>

<!-- Main Section (Products) -->
<section id="products" class="container">
    <h2>Featured Products</h2>
    <div class="product-list">
        <!-- Product 1 -->
        <div class="product-item">
            <img src="toy1.jpg" alt="Toy 1">
            <h3>Toy 1</h3>
            <p>$10.00</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
        <!-- Product 2 -->
        <div class="product-item">
            <img src="toy2.jpg" alt="Toy 2">
            <h3>Toy 2</h3>
            <p>$15.00</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
        <!-- Product 3 -->
        <div class="product-item">
            <img src="toy3.jpg" alt="Toy 3">
            <h3>Toy 3</h3>
            <p>$20.00</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
    </div>
</section>

<!-- Footer Section -->
<footer>
    <div class="container">
        <p>&copy; 2025 Toytastic. All Rights Reserved.</p>
    </div>
</footer>

<!-- Optional JavaScript -->
<script src="app.js"></script>
</body>

</html>
