<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toytastic - Children's Toy Store</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Welcome to Toytastic - Children's Toy Store</h1>
  </header>
  <main>
    <div class="product-grid" id="product-grid">
      <!-- Products will be dynamically injected here -->
    </div>
  </main>
  <footer>
    <button id="view-cart" onclick="viewCart()">View Cart</button>
  </footer>
</div>

<script>
  // Fetch products dynamically from Java backend or database
  fetch('/products')  // Assuming this endpoint returns products as JSON
          .then(response => response.json())
          .then(products => {
            const productGrid = document.getElementById('product-grid');
            products.forEach(product => {
              const productDiv = document.createElement('div');
              productDiv.classList.add('product');
              productDiv.innerHTML = `
          <img src="${product.image}" alt="${product.name}">
          <h2>${product.name}</h2>
          <p>$${product.price}</p>
          <button onclick="addToCart(${product.id})">Add to Cart</button>
        `;
              productGrid.appendChild(productDiv);
            });
          });

  // Add to Cart functionality
  function addToCart(productId) {
    fetch('/add-to-cart', {
      method: 'POST',
      body: JSON.stringify({ productId }),
      headers: { 'Content-Type': 'application/json' }
    });
  }

  // View Cart functionality
  function viewCart() {
    window.location.href = '/cart';
  }
</script>
</body>
</html>
