<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toytastic - Children's Toy Store</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Welcome to Toytastic - Children's Toy Store</h1>
  </header>

  <!-- Product Section -->
  <main>
    <div class="product-grid">
      <!-- Product 1 -->
      <div class="product" data-id="1">
        <img src="toy_car.jpg" alt="Toy Car">
        <h2>Toy Car</h2>
        <p>$10.99</p>
        <button class="add-to-cart">Add to Cart</button>
      </div>

      <!-- Product 2 -->
      <div class="product" data-id="2">
        <img src="lego_set.jpg" alt="Lego Set">
        <h2>Lego Set</h2>
        <p>$29.99</p>
        <button class="add-to-cart">Add to Cart</button>
      </div>

      <!-- Product 3 -->
      <div class="product" data-id="3">
        <img src="doll_house.jpg" alt="Doll House">
        <h2>Doll House</h2>
        <p>$19.99</p>
        <button class="add-to-cart">Add to Cart</button>
      </div>

      <!-- Product 4 -->
      <div class="product" data-id="4">
        <img src="teddy_bear.jpg" alt="Teddy Bear">
        <h2>Teddy Bear</h2>
        <p>$15.49</p>
        <button class="add-to-cart">Add to Cart</button>
      </div>
    </div>
  </main>

  <!-- Cart Section -->
  <footer>
    <button id="view-cart">View Cart</button>
    <div id="cart-items"></div> <!-- Dynamically filled with cart items -->
    <p>Total: $<span id="total-price">0.00</span></p>
  </footer>
</div>

<script src="cart.js"></script> <!-- Cart JavaScript for managing the cart -->
</body>
</html>
